<!DOCTYPE html>

<html lang="en">

<head>

    <!-- ========================= -->
    <!-- META TAGS -->
    <!-- ========================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Task Manager
    </title>

    <!-- ========================= -->
    <!-- BOOTSTRAP -->
    <!-- ========================= -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ========================= -->
    <!-- MAIN CSS -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <!-- ========================= -->
    <!-- DARK MODE CSS -->
    <!-- ========================= -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/darkmode.css') }}"
    >

</head>

<body>

<!-- ========================= -->
<!-- NAVBAR -->
<!-- ========================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <!-- LOGO -->

        <a
            class="navbar-brand fw-bold"
            href="/"
        >
            TaskManager
        </a>

        <!-- NAVIGATION BUTTONS -->

        <div class="d-flex gap-2">

            <a
                href="/login"
                class="btn btn-outline-light"
            >
                Login
            </a>

            <a
                href="/signup"
                class="btn btn-primary"
            >
                Signup
            </a>

        </div>

    </div>

</nav>

<!-- ========================= -->
<!-- FLASH MESSAGES -->
<!-- ========================= -->

<div class="container mt-4">

    {% with messages =
        get_flashed_messages(with_categories=true)
    %}

        {% if messages %}

            {% for category, message in messages %}

                <div
                    class="
                        alert
                        alert-{{ category }}
                        alert-dismissible
                        fade
                        show
                    "
                    role="alert"
                >

                    {{ message }}

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                    ></button>

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <!-- PAGE CONTENT -->

    {% block content %}
    {% endblock %}

</div>

<!-- ========================= -->
<!-- BOOTSTRAP JS -->
<!-- ========================= -->

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
></script>

<!-- ========================= -->
<!-- DARK MODE JS -->
<!-- ========================= -->

<script
    src="{{ url_for('static', filename='js/darkmode.js') }}"
></script>

</body>

</html>
