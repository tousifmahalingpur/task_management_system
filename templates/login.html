{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg p-4">

            <h2 class="text-center mb-4">Login</h2>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    class="form-control mb-3"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="Password"
                    required
                >

                <button class="btn btn-dark w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
